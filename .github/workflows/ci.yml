name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  viewer-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Run viewer unit tests (stdlib-only, no app deps)
        run: python -m pytest tools/sc_spire_agent_sdk_orchestrator/test_viewer_units.py -v
